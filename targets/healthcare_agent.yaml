agent_name: healthcare-ai-agent

compliance_frameworks:
  - owasp_llm_2025
  - owasp_agentic_2025
  - nist_ai_rmf_genai
  - india_dpdp_2023
  - mitre_atlas

sources:
  - type: yaml_inline
    runtime:
      endpoint: http://localhost:8000/api/health/check
      protocol: http
      auth:
        type: none
      timeout_s: 30

    capabilities:
      max_steps: 10
      context_budget_tokens: 8000

      tools:
        - intake_agent
        - triage_agent
        - diagnosis_agent
        - appointment_agent
        - report_explainer_agent
        - medicine_reminder_agent
        - uplai_privacy_scan

      destructive_tools: []

      requires_hitl: false

    slos:
      p95_latency_ms: 10000
      max_cost_per_task_usd: 0.05

    security:
      pii_fields:
        - patient_name
        - age
        - symptoms
        - phone_number
        - email
        - medical_report

      allowed_data_regions:
        - ap-south-1
        - centralindia

      data_classification:
        - CONFIDENTIAL
        - DPDP_PERSONAL
        - HEALTH_DATA

    golden_dataset:
      path: ./fixtures/golden_dataset/healthcare_cases.jsonl
      format: jsonl
      input_field: input
      expected_field: expected

    runbooks_dir: ./runbooks

  - type: repo
    path: ./backend